<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>friendsclub - Connect with Friends</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f2f5;
            color: #1c1e21;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            min-height: 100vh;
        }
        /* Header */
        
        .header {
            position: sticky;
            top: 0;
            background: white;
            border-bottom: 1px solid #ddd;
            z-index: 100;
            padding: 10px 0;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #1877f2;
        }
        
        .search-bar {
            flex: 1;
            max-width: 400px;
            margin: 0 20px;
        }
        
        .search-bar input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ccd0d5;
            border-radius: 24px;
            background: #f0f2f5;
            font-size: 16px;
        }
        
        .header-icons {
            display: flex;
            gap: 20px;
        }
        
        .icon-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        
        .icon-btn:hover {
            background: #e4e6ea;
        }
        /* Main Content */
        
        .main-content {
            flex: 1;
            padding: 20px;
            margin-right: 20px;
        }
        /* Create Post */
        
        .create-post {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .post-input-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, #1877f2, #42a5f5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .post-input {
            flex: 1;
            border: none;
            background: #f0f2f5;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 16px;
            resize: none;
            outline: none;
        }
        
        .post-actions {
            display: flex;
            justify-content: space-around;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e4e6ea;
        }
        
        .post-action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .post-action-btn:hover {
            background: #e4e6ea;
        }
        /* Posts Feed */
        
        .posts-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .post {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .post-header {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .post-header h3 {
            font-size: 16px;
            font-weight: 600;
        }
        
        .post-header span {
            color: #65676b;
            font-size: 14px;
        }
        
        .post-content {
            padding: 0 16px 16px;
        }
        
        .post-text {
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 12px;
        }
        
        .post-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        
        .post-actions-bar {
            padding: 0 16px 16px;
            border-top: 1px solid #e4e6ea;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        
        .like-btn {
            color: #65676b;
        }
        
        .like-btn.liked {
            color: #1877f2;
            background: rgba(24, 119, 242, 0.1);
        }
        
        .comment-btn {
            color: #65676b;
        }
        
        .share-btn {
            color: #65676b;
        }
        
        .action-btn:hover {
            background: #e4e6ea;
        }
        
        .comments-section {
            display: none;
            padding-top: 12px;
        }
        
        .comments-section.active {
            display: block;
        }
        
        .comment {
            display: flex;
            gap: 12px;
            padding: 8px 0;
        }
        
        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e4e6ea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }
        
        .comment-content {
            flex: 1;
        }
        
        .comment-author {
            font-weight: 600;
            font-size: 14px;
        }
        
        .comment-text {
            font-size: 14px;
            color: #1c1e21;
        }
        
        .add-comment {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            align-items: center;
        }
        
        .add-comment input {
            flex: 1;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            background: #f0f2f5;
            outline: none;
            font-size: 14px;
        }
        /* Sidebar */
        
        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .profile-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        
        .profile-name {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .profile-info {
            text-align: center;
            color: #65676b;
            font-size: 14px;
        }
        /* Responsive */
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                overflow-x: auto;
                padding: 20px;
            }
            .main-content {
                margin-right: 0;
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="logo">SocialHub</div>
                <div class="search-bar">
                    <input type="text" placeholder="Search SocialHub">
                </div>
                <div class="header-icons">
                    <button class="icon-btn">👤</button>
                    <button class="icon-btn">🔔</button>
                    <button class="icon-btn">💬</button>
                    <button class="icon-btn">☰</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Create Post -->
            <div class="create-post">
                <div class="post-input-container">
                    <div class="user-avatar">You</div>
                    <textarea class="post-input" placeholder="What's on your mind?" rows="2"></textarea>
                </div>
                <div class="post-actions">
                    <button class="post-action-btn">
                        <span>📸</span> Photo
                    </button>
                    <button class="post-action-btn">
                        <span>🎥</span> Video
                    </button>
                    <button class="post-action-btn">
                        <span>😊</span> Feeling
                    </button>
                </div>
            </div>

            <!-- Posts Feed -->
            <div class="posts-feed" id="postsFeed">
                <!-- Posts will be dynamically added here -->
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="profile-card">
                <div class="profile-avatar">JD</div>
                <div class="profile-name">John Doe</div>
                <div class="profile-info">View your profile</div>
            </div>
        </div>
    </div>

    <script>
        // Sample posts data
        const samplePosts = [{
            id: 1,
            author: "Sarah Johnson",
            avatar: "SJ",
            time: "2h ago",
            content: "Just finished an amazing hike! The views were breathtaking. 🏔️✨ #NatureLover #AdventureTime",
            image: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80",
            likes: 47,
            comments: [{
                author: "Mike Chen",
                content: "Wow, looks incredible! Where is this?"
            }, {
                author: "Emma Wilson",
                content: "Gorgeous! Need to add this to my list!"
            }]
        }, {
            id: 2,
            author: "Mike Chen",
            avatar: "MC",
            time: "5h ago",
            content: "New project launch went perfectly! Team crushed it. 🚀",
            likes: 23,
            comments: [{
                author: "Sarah Johnson",
                content: "Congrats Mike! Knew you guys would nail it!"
            }]
        }, {
            id: 3,
            author: "Emma Wilson",
            avatar: "EW",
            time: "1d ago",
            content: "Started reading 'Atomic Habits' and it's already changing my perspective. Anyone else reading this? 📚",
            likes: 156,
            comments: [{
                author: "John Doe",
                content: "Love that book! The 1% better every day concept is gold."
            }, {
                author: "Lisa Park",
                content: "On chapter 5. Game changer!"
            }]
        }];

        let posts = [...samplePosts];
        let likedPosts = new Set();

        // Initialize posts
        function initPosts() {
            const feed = document.getElementById('postsFeed');
            feed.innerHTML = '';

            posts.forEach(post => {
                feed.appendChild(createPostElement(post));
            });
        }

        // Create post element
        function createPostElement(post) {
            const postEl = document.createElement('div');
            postEl.className = 'post';
            postEl.dataset.postId = post.id;

            const isLiked = likedPosts.has(post.id);

            postEl.innerHTML = `
                <div class="post-header">
                    <div class="user-avatar">${post.avatar}</div>
                    <div>
                        <h3>${post.author}</h3>
                        <span>${post.time}</span>
                    </div>
                </div>
                <div class="post-content">
                    ${post.image ? `<img src="${post.image}" class="post-image" alt="Post image">` : ''}
                    <p class="post-text">${post.content}</p>
                </div>
                <div class="post-actions-bar">
                    <div class="action-buttons">
                        <button class="action-btn like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                            <span>👍</span>
                            <span>${post.likes} ${post.likes === 1 ? 'like' : 'likes'}</span>
                        </button>
                        <button class="action-btn comment-btn" onclick="toggleComments(${post.id})">
                            <span>💬</span>
                            <span>${post.comments.length} ${post.comments.length === 1 ? 'comment' : 'comments'}</span>
                        </button>
                        <button class="action-btn share-btn">
                            <span>📤</span>
                            <span>Send</span>
                        </button>
                    </div>
                    <div class="comments-section" id="comments-${post.id}">
                        ${post.comments.map(comment => `
                            <div class="comment">
                                <div class="comment-avatar">${comment.author.slice(0,2)}</div>
                                <div class="comment-content">
                                    <div class="comment-author">${comment.author}</div>
                                    <div class="comment-text">${comment.content}</div>
                                </div>
                            </div>
                        `).join('')}
                        <div class="add-comment">
                            <input type="text" placeholder="Write a comment..." onkeypress="handleCommentEnter(event, ${post.id})">
                            <button onclick="addComment(${post.id})">Post</button>
                        </div>
                    </div>
                </div>
            `;

            return postEl;
        }

        // Toggle like
        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            const btn = document.querySelector(`[data-post-id="${postId}"] .like-btn`);
            
            if (likedPosts.has(postId)) {
                likedPosts.delete(postId);
                post.likes--;
                btn.classList.remove('liked');
            } else {
                likedPosts.add(postId);
                post.likes++;
                btn.classList.add('liked');
            }
            
            btn.innerHTML = `<span>👍</span><span>${post.likes} ${post.likes === 1 ? 'like' : 'likes'}</span>`;
        }

        // Toggle comments
        function toggleComments(postId) {
            const commentsSection = document.getElementById(`comments-${postId}`);
            commentsSection.classList.toggle('active');
        }

        // Add comment
        function addComment(postId) {
            const input = document.querySelector(`#comments-${postId} input`);
            const text = input.value.trim();
            
            if (text) {
                const post = posts.find(p => p.id === postId);
                post.comments.push({
                    author: "You",
                    content: text
                });
                
                input.value = '';
                initPosts(); // Refresh posts
            }
        }

        // Handle enter key in comment input
        function handleCommentEnter(event, postId) {
            if (event.key === 'Enter') {
                addComment(postId);
            }
        }

        // Create new post
        document.querySelector('.post-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                createNewPost();
            }
        });

        function createNewPost() {
            const input = document.querySelector('.post-input');
            const content = input.value.trim();
            
            if (content) {
                const newPost = {
                    id: Date.now(),
                    author: "You",
                    avatar: "You".slice(0,2),
                    time: "Just now",
                    content: content,
                    likes: 0,
                    comments: []
                };
                
                posts.unshift(newPost);
                input.value = '';
                initPosts();
            }
        }

        // Initialize
        initPosts();
    </script>
</body>

</html>
